<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login page</title>
  <link rel="stylesheet" href="LoginRegisterPage.css"
</head>
<body>
  <div class="container">
    <h2 id="topText">Hello!</h2>
    <p id="introduce">Sign In to Get Started</p>
    <form id="formnya">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email addres" required>
      <input type="password" id="password" placeholder="Password" required>
      <div class="reminder">
      <input type="checkbox" id="checkbox" name="checkbox">
      <label for="checkbox" id="checkboxLabel">Remember for 30 days</label>
      </div>
      <button id="btn">Sign in</button>
    </form>
    <div class="footerPage">
    <p>Don't have an account?  <a href="register-page.html" id="pindahPage">Register</a></p>
    </div>
  </div>
</body>
</html>
