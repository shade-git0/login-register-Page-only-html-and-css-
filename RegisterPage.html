<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>register page</title>
  <link rel="stylesheet" href="LoginRegisterPage.css"
</head>
<body>
  <div class="container">
    <h2 id="topText">Hello!</h2>
    <p id="introduce">Sign Up to Get Started</p>
    <form id="formnya">
      <input type="text" id="username" placeholder="Username" required>
      <input type="email" id="email" placeholder="Email addres" required>
      <input type="password" id="password" placeholder="Password" required>
      <input type="password" id="password" placeholder="Confirm password" required>
      <div class="reminder">
      <input type="checkbox" id="checkbox" name="checkbox" required>
      <label for="checkbox" id="checkboxLabel">I am 18 years of age or older
      </label>
      </div>
      <button id="btn">Register</button></button>
    </form>
    <div class="footerPage">
    <p>Aleardy have an account?  <a href="login-page.html" id="pindahPage">Login</a></p>
    </div>
  </div>
</body>
